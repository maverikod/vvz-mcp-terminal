name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests (requires Docker for sandbox E2E)
        env:
          # Prefer a small image commonly available on GitHub runners.
          MCP_TERMINAL_E2E_IMAGE: python:3.12-slim
        run: pytest tests/ -q
