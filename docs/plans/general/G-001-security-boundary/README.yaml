step_id: G-001
name: Security Boundary and Trust Model
status: frozen
description: 'Establishes the security boundary of the system: what the server is
  permitted to be (a controlled project sandbox), what it must never become (a general-purpose
  host shell), and who is trusted versus untrusted. Defines the zero-trust invariant:
  every request from the model is treated as untrusted regardless of prior interactions.
  Covers the full enumeration of trusted components, untrusted inputs, and sensitive
  host resources that must remain unexposed.'
