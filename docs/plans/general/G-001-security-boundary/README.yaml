step_id: G-001
name: Security Boundary and Trust Model
status: frozen
description: 'Establishes the security boundary of the system: what the server is
  permitted to be (a controlled project sandbox), what it must never become (a general-purpose
  host shell), and who is trusted versus untrusted. Defines the zero-trust invariant:
  every request from the model is treated as untrusted regardless of prior interactions.
  Covers the full enumeration of trusted components, untrusted inputs, and sensitive
  host resources that must remain unexposed.

  Per ExecutionTarget trust: sandbox relies on container isolation (SandboxPolicy +
  ContainerRuntime); host relies on HostExecutionPolicy allowlist, hard-forbidden executables,
  and forbidden-pattern scan; attached (planned) delegates runtime isolation to the container
  owner.

  Non-goal preservation: when terminal.host_execution.enabled is false or allowed_commands
  is empty, the server does not widen beyond the §2 non-goal; operator-curated allowlist
  is the only boundary widening for host.

  §4.3 sensitive host resources on host target are mitigated via HostExecutionPolicy:
  hard-forbidden executables, forbidden patterns (--pid=host, docker.sock, $(...)), and
  basename-only allowlist — not container isolation.'
