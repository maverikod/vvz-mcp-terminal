sequential_chains:
- file: mcp_terminal/services/sandbox_policy.py
  note: 5 AS spanning G-001 and G-003; must run in priority order 1→2→3→4
  sequence:
  - as_id: G-001-T-001-A-001
    op: create_file
    p: 1
    wave: 0
  - as_id: G-001-T-002-A-001
    op: modify_file
    p: 1
    wave: 0
  - as_id: G-003-T-001-A-001
    op: modify_file
    p: 2
    wave: 0
  - as_id: G-003-T-003-A-001
    op: modify_file
    p: 3
    wave: 0
  - as_id: G-003-T-004-A-001
    op: modify_file
    p: 4
    wave: 0
  total_wall_time: 5 sequential coder calls
- file: mcp_terminal/services/project_registry.py
  note: 3 AS across G-002; run in priority order 1→2→3
  sequence:
  - as_id: G-002-T-001-A-001
    op: create_file
    p: 1
    wave: 0
  - as_id: G-002-T-002-A-001
    op: modify_file
    p: 1
    wave: 0
  - as_id: G-002-T-003-A-001
    op: modify_file
    p: 1
    wave: 0
  total_wall_time: 3 sequential coder calls
waves:
- wave_id: 0
  name: Foundation — no internal dependencies
  description: All AS in this wave create or modify files with zero mcp_terminal-internal
    imports. They may be executed in any order or fully in parallel. The sandbox_policy.py
    chain and project_registry.py chain are internally sequential but independent
    of each other.
  can_start_after_wave: null
  parallel_groups:
  - group_id: 0-A
    name: sandbox_policy.py sequential chain
    note: Internally sequential (5 steps). Parallel with all other W0 groups.
    steps:
    - as_id: G-001-T-001-A-001
      target_file: mcp_terminal/services/sandbox_policy.py
      op: create_file
      concepts:
      - C-003
      description: TrustCategory, TrustBoundary, TERMINAL_TRUST_BOUNDARY
      must_precede:
      - G-001-T-002-A-001
    - as_id: G-001-T-002-A-001
      target_file: mcp_terminal/services/sandbox_policy.py
      op: modify_file
      concepts:
      - C-003
      - C-015
      description: PolicyConfig, ValidationResult, SandboxPolicy.validate()
      must_precede:
      - G-003-T-001-A-001
    - as_id: G-003-T-001-A-001
      target_file: mcp_terminal/services/sandbox_policy.py
      op: modify_file
      concepts:
      - C-003
      - C-010
      description: MountSpec, SandboxPolicy.build_mount_spec()
      must_precede:
      - G-003-T-003-A-001
    - as_id: G-003-T-003-A-001
      target_file: mcp_terminal/services/sandbox_policy.py
      op: modify_file
      concepts:
      - C-003
      - C-010
      description: NetworkSpec, DEFAULT/PACKAGE_REGISTRY_NETWORK_SPEC, build_network_spec()
      must_precede:
      - G-003-T-004-A-001
    - as_id: G-003-T-004-A-001
      target_file: mcp_terminal/services/sandbox_policy.py
      op: modify_file
      concepts:
      - C-003
      - C-010
      description: ImageAndCommandSpec, IMAGE_PROFILE_MAP, build_image_and_command_spec()
      must_precede: []
  - group_id: 0-B
    name: project_registry.py sequential chain
    note: Internally sequential (3 steps). Parallel with all other W0 groups.
    steps:
    - as_id: G-002-T-001-A-001
      target_file: mcp_terminal/services/project_registry.py
      op: create_file
      concepts:
      - C-002
      description: ProjectMarker, MarkerValidationError, validate_marker_file()
      must_precede:
      - G-002-T-002-A-001
    - as_id: G-002-T-002-A-001
      target_file: mcp_terminal/services/project_registry.py
      op: modify_file
      concepts:
      - C-001
      - C-002
      description: RegistryEntry, ProjectRegistry.__init__(), build(), known_project_ids
      must_precede:
      - G-002-T-003-A-001
    - as_id: G-002-T-003-A-001
      target_file: mcp_terminal/services/project_registry.py
      op: modify_file
      concepts:
      - C-001
      description: ResolutionResult, ProjectRegistry.resolve(), refresh()
      must_precede: []
  - group_id: 0-C
    name: Independent service files
    note: All fully parallel with each other and with 0-A, 0-B.
    steps:
    - as_id: G-004-T-001-A-001
      target_file: mcp_terminal/services/session_store.py
      op: create_file
      concepts:
      - C-004
      - C-005
      description: SessionRecord, SessionStore (create/touch/delete/list)
    - as_id: G-004-T-002-A-001
      target_file: mcp_terminal/services/command_history.py
      op: create_file
      concepts:
      - C-006
      - C-007
      description: CommandRecord, CommandHistory (allocate_seq, append, update, list)
    - as_id: G-005-T-003-A-001
      target_file: mcp_terminal/services/audit_writer.py
      op: create_file
      concepts:
      - C-012
      description: AuditWriter.write()
    - as_id: G-006-T-001-A-001
      target_file: mcp_terminal/errors.py
      op: create_file
      concepts:
      - C-015
      description: ErrorCode constants, ALL_ERROR_CODES, TerminalError
  - group_id: 0-D
    name: Config package files
    note: config_cli depends on generator+validator; generator and validator are parallel.
    steps:
    - as_id: G-005-T-001-A-004
      target_file: mcp_terminal/config/__init__.py
      op: create_file
      concepts:
      - C-013
      description: Package init for mcp_terminal.config
    - as_id: G-005-T-001-A-001
      target_file: mcp_terminal/config/config_generator.py
      op: create_file
      concepts:
      - C-013
      description: TERMINAL_CONFIG_DEFAULTS, generate_terminal_config()
      must_precede:
      - G-005-T-001-A-003
    - as_id: G-005-T-001-A-002
      target_file: mcp_terminal/config/config_validator.py
      op: create_file
      concepts:
      - C-013
      description: ValidationError, validate_terminal_config()
      must_precede:
      - G-005-T-001-A-003
    - as_id: G-005-T-001-A-003
      target_file: mcp_terminal/config/config_cli.py
      op: create_file
      concepts:
      - C-013
      description: cmd_generate(), cmd_validate(), main()
      note: Depends on A-001 and A-002 (same wave); schedule last in this group.
  - group_id: 0-E
    name: Self-contained test
    note: No internal imports; can run in parallel with everything.
    steps:
    - as_id: G-006-T-002-A-001
      target_file: tests/test_queue_result_semantics.py
      op: create_file
      concepts:
      - C-011
      description: 8 unit tests for QueueResultSemantics invariant (self-contained
        helper)
- wave_id: 1
  name: First-level dependents
  description: Files that import from Wave-0 outputs. All Wave-0 steps must be complete
    before this wave begins. Steps within this wave are parallel unless they share
    a target file.
  can_start_after_wave: 0
  steps:
  - as_id: G-003-T-002-A-001
    target_file: mcp_terminal/services/container_runner.py
    op: create_file
    concepts:
    - C-010
    - C-003
    description: ContainerSpec, ContainerRunner (build_cmd)
    imports_from_wave_0:
    - sandbox_policy.MountSpec
  - as_id: G-004-T-004-A-001
    target_file: mcp_terminal/services/output_reader.py
    op: create_file
    concepts:
    - C-008
    description: SearchMatch, StatResult, OutputReader (read/tail/search/stat)
    imports_from_wave_0:
    - command_history.CommandHistory
  - as_id: G-005-T-002-A-001
    target_file: mcp_terminal/services/ttl_cleanup.py
    op: create_file
    concepts:
    - C-013
    - C-005
    description: TtlCleanupService (start/stop/_run/_cleanup_once)
    imports_from_wave_0:
    - session_store.SessionStore
  - as_id: G-004-T-005-A-006
    target_file: mcp_terminal/commands/__init__.py
    op: create_file
    concepts:
    - C-014
    description: Package init for mcp_terminal.commands
    imports_from_wave_0: []
  - as_id: G-004-T-005-A-001
    target_file: mcp_terminal/commands/terminal_list_command.py
    op: create_file
    concepts:
    - C-014
    description: TerminalListCommand
    imports_from_wave_0:
    - command_history.CommandHistory
    - session_store.SessionStore
  - as_id: G-004-T-005-A-002
    target_file: mcp_terminal/commands/terminal_get_command.py
    op: create_file
    concepts:
    - C-014
    description: TerminalGetCommand
    imports_from_wave_0:
    - command_history.CommandHistory
    - session_store.SessionStore
  - as_id: G-004-T-005-A-003
    target_file: mcp_terminal/commands/terminal_sessions_command.py
    op: create_file
    concepts:
    - C-014
    description: TerminalSessionsCommand
    imports_from_wave_0:
    - session_store.SessionStore
  - as_id: G-004-T-005-A-004
    target_file: mcp_terminal/commands/terminal_search_commands_command.py
    op: create_file
    concepts:
    - C-014
    description: TerminalSearchCommandsCommand
    imports_from_wave_0:
    - command_history.CommandHistory
    - session_store.SessionStore
- wave_id: 2
  name: Second-level dependents
  description: Files that import from Wave-1 outputs. All Wave-1 steps must complete
    before this wave begins.
  can_start_after_wave: 1
  steps:
  - as_id: G-004-T-003-A-002
    target_file: mcp_terminal/jobs/__init__.py
    op: create_file
    concepts:
    - C-009
    description: Package init for mcp_terminal.jobs
    imports_from_wave_1: []
    note: No imports, but jobs/__init__.py must exist before terminal_execution_job.py
      is importable.
  - as_id: G-004-T-003-A-001
    target_file: mcp_terminal/jobs/terminal_execution_job.py
    op: create_file
    concepts:
    - C-009
    - C-011
    description: JobParams, TerminalExecutionJob.run()
    imports_from_wave_0:
    - command_history.CommandHistory
    imports_from_wave_1:
    - container_runner.ContainerRunner
    - container_runner.ContainerSpec
  - as_id: G-004-T-005-A-005
    target_file: mcp_terminal/commands/terminal_get_status_command.py
    op: create_file
    concepts:
    - C-014
    - C-011
    description: TerminalGetStatusCommand (applies QueueResultSemantics)
    imports_from_wave_0:
    - command_history.CommandHistory
    - session_store.SessionStore
    imports_from_wave_1:
    - output_reader.OutputReader
- wave_id: 3
  name: Server registration and integration
  description: Modifies the existing term_server.py to register all terminal_* commands.
    Requires all command modules (Wave-1 and Wave-2) to be complete.
  can_start_after_wave: 2
  steps:
  - as_id: G-004-T-006-A-001
    target_file: mcp_terminal/term_server.py
    op: modify_file
    concepts:
    - C-014
    - C-016
    description: Add register_custom_commands_hook, _SESSION_STORE, _TERMINAL_COMMANDS,
      _register_terminal_commands()
    imports_from_wave_1:
    - terminal_list_command.TerminalListCommand
    - terminal_get_command.TerminalGetCommand
    - terminal_sessions_command.TerminalSessionsCommand
    - terminal_search_commands_command.TerminalSearchCommandsCommand
    - session_store.SessionStore
    imports_from_wave_2:
    - terminal_get_status_command.TerminalGetStatusCommand
- wave_id: 4
  name: Integration tests
  description: Tests that import from the full domain module set. All production code
    (Waves 0-3) must be complete before integration tests run.
  can_start_after_wave: 3
  steps:
  - as_id: G-007-T-001-A-001
    target_file: tests/test_extension_model.py
    op: create_file
    concepts:
    - C-016
    - C-013
    description: 5 import smoke tests for AdapterSkeleton extension model
    imports_all_waves: true
  - as_id: G-007-T-002-A-001
    target_file: tests/test_domain_invariants.py
    op: create_file
    concepts:
    - C-016
    - C-013
    description: 9 unit tests for key domain invariants
    imports_from_waves:
    - 0
    - 1
critical_path:
  description: Longest sequential dependency chain determining minimum calendar time.
    All other chains can proceed in parallel.
  chain:
  - step: G-001-T-001-A-001
  - step: G-001-T-002-A-001
  - step: G-003-T-001-A-001
  - step: G-003-T-003-A-001
  - step: G-003-T-004-A-001
  - step: G-003-T-002-A-001
  - step: G-004-T-003-A-001
  - step: G-004-T-006-A-001
  - step: G-007-T-001-A-001
  total_sequential_steps: 9
  parallel_savings: 'Without parallelization: 31 sequential calls. With this map:
    critical path = 9 calls. Max parallelism at Wave 0: up to 9 simultaneous coder
    calls. Max parallelism at Wave 1: up to 9 simultaneous coder calls.'
summary:
  wave_0_steps: 16
  wave_1_steps: 8
  wave_2_steps: 3
  wave_3_steps: 1
  wave_4_steps: 2
  total: 30
  note: test_queue_result_semantics (W0-E) + all other 30 AS = 31 total
intra_wave_ordering:
- rule: 'Within group 0-A (sandbox_policy.py): execute in priority order 1→2→3→4→5.'
- rule: 'Within group 0-B (project_registry.py): execute in priority order 1→2→3.'
- rule: 'Within group 0-D: start A-001 and A-002 together; A-003 (config_cli) after
    both complete.'
- rule: 'All other Wave-0 groups: fully parallel, no ordering constraint.'
- rule: 'Wave-1 steps: all parallel (different files, all deps from Wave-0).'
- rule: 'Wave-2 steps: all parallel (different files, deps from Wave-0 and Wave-1).'
- rule: 'Wave-3: single step; must wait for Wave-2 terminal_get_status_command.py.'
- rule: 'Wave-4: both tests parallel (different files).'
