  expected: from mcp_terminal.services.host_shell_scanner import 
    decompose_shell_command, find_forbidden_in_shell_command, 
    HOST_FORBIDDEN_SUBSTRINGS, HOST_FORBIDDEN_EXECUTABLES succeeds without 
