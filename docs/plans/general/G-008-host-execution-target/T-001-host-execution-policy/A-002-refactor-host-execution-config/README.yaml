  import (\n       HOST_FORBIDDEN_EXECUTABLES,\n       HOST_FORBIDDEN_SUBSTRINGS,\n\
  \       collect_shell_scan_texts,\n       command_executable_name,\n       decompose_shell_command,\n\
  \       find_forbidden_in_shell_command,\n       find_forbidden_substring,\n   \
