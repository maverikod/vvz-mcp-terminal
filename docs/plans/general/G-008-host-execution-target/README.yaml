step_id: G-008
name: Host Execution Target
status: frozen
description: "Formalizes the host execution target as a first-class concept of the
  system. Covers the gate (terminal.host_execution.enabled + non-empty allowed_commands),
  the validation policy (HostExecutionPolicy) including the allowlist by basename,
  the hard-forbidden executables list, the forbidden-pattern scanner over command
  text, argv elements, redirect targets, here-string operands, and heredoc bodies,
  the host job execution lifecycle (no container start/stop/mount steps), the cwd/venv
  resolution on the host project tree, and shared session/sequence space with the
  sandbox target. Establishes terminal_run_host as the public MCP command exposing
  this target. The target is transitional and will be removed under the conditions
  in tech_spec.md §28.11 (once code-analysis-server and mcp_terminal themselves run
  inside containers reachable via the attached target). Until then the target is supported
  and config-gated.

  Cross-G ownership: host_execution config overlay (TRT-T-004) primary G-005 T-001;
  audit host fields (TRT-T-008) primary G-005 T-003; H-1..H-11 tests (TRT-T-006) primary
  G-007 T-002; terminal_get_status execution_target (TRT-T-007) G-004 T-005 / G-008 T-003.

  Implementation complete for this revision: host_shell_scanner.py, host_execution_config.py,
  terminal_run_host command chain, TerminalHostExecutionJob, and host test modules are
  present; 195 pytest passed, 0 skipped when Docker is available (section 21 MVP acceptance fully
  automated in test_sandbox_mvp_acceptance.py and test_sandbox_docker_e2e.py); suite includes
  test_host_invariants.py
  and test_host_shell_scanner.py.\n"
