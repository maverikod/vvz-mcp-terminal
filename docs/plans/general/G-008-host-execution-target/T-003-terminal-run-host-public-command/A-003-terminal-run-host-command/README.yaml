prompt: "Create the file `mcp_terminal/commands/terminal_run_host_command.py`.\n\n\
  Operation: create_file\n\n## Purpose\n\nImplements TerminalRunHostCommand: the public
  MCP command class that exposes\nterminal_run_host in PublicCommandSet (C-014). This
  is the sole public entry point\nfor the host execution target (C-017). Conforms
  to the adapter command class shape\nfrom metadatastd.md: name, version, descr, category,
  author, email as ClassVar;\nget_schema(), metadata(), validate_params(), execute()
  as methods.\n\n## MRS concept excerpts\n\nC-014 PublicCommandSet:\n  - Name: \"\
  terminal_run_host\" (terminal_ prefix; no aliases).\n  - Registered via register_custom_commands_hook.\n\
  \  - get_schema() and metadata() are separate; schema for validation, metadata for
  docs.\n\nC-018 HostExecutionPolicy:\n  - Security validation delegated to enqueue_host_terminal_run
  in host_run_service.py,\n    which calls validate_host_run_request internally.\n\
  \  - Produces HOST_EXECUTION_DISABLED, HOST_COMMAND_NOT_ALLOWED, HOST_FORBIDDEN_COMMAND.\n\
  \nC-019 TerminalHostExecutionJob:\n  - Enqueued by enqueue_host_terminal_run; not
  invoked directly by this command.\n  - Response carries execution_target=\"host\"\
  .\n\nC-015 ErrorContract:\n  - On rejection: INVALID_COMMAND, PROJECT_NOT_FOUND,
  INVALID_SESSION, INVALID_CWD,\n    HOST_EXECUTION_DISABLED, HOST_COMMAND_NOT_ALLOWED,
  HOST_FORBIDDEN_COMMAND.\n\nC-017 ExecutionTarget:\n  - This command exclusively
  targets host; response always has execution_target=\"host\".\n\n## Module docstring\n\
  \"\"\"\nterminal_run_host: run allowlisted commands on the host (not in Docker).\n\
  \nRequires ``terminal.host_execution.enabled`` and a non-empty ``allowed_commands``
  list.\nUse ``terminal_run`` for sandbox container execution.\n\nAuthor: Vasiliy
  Zdanovskiy\nEmail: vasilyvz@gmail.com\n\"\"\"\n\n## Imports (exact)\nfrom __future__
  import annotations\n\nfrom typing import Any, ClassVar, Dict, List, Optional, Type\n\
  \nfrom mcp_proxy_adapter.commands.base import Command, CommandResult\n\nfrom mcp_terminal.commands.session_resolve
  import resolve_session\nfrom mcp_terminal.commands.terminal_run_host_metadata import
  get_terminal_run_host_metadata\nfrom mcp_terminal.commands.terminal_run_host_schema
  import get_terminal_run_host_schema\nfrom mcp_terminal.runtime_context import get_session_store,
  registry_resolve_project\nfrom mcp_terminal.services.host_run_service import enqueue_host_terminal_run\n\
  from mcp_terminal.services.shell_state import resolve_cwd, resolve_use_venv\n\n\
  ## Constant\n_DEFAULT_TIMEOUT_S: int = 600\n\n## Class\n\n### class TerminalRunHostCommand(Command)\n\
  Class variables (ClassVar):\n  name: ClassVar[str] = \"terminal_run_host\"\n  version:
  ClassVar[str] = \"1.0.0\"\n  descr: ClassVar[str] = (\n      \"Run an allowlisted
  command on the host (outside Docker). Requires \"\n      \"terminal.host_execution.enabled
  in server config. Returns job_id and seq; \"\n      \"poll terminal_get_status.\"\
  \n  )\n  category: ClassVar[str] = \"custom\"\n  author: ClassVar[str] = \"Vasiliy
  Zdanovskiy\"\n  email: ClassVar[str] = \"vasilyvz@gmail.com\"\n  result_class: ClassVar[Type[CommandResult]]
  = CommandResult\n\nClass docstring: \"\"\"Queue host-side command execution for
  an existing session.\"\"\"\n\n### get_schema() classmethod\nSignature: @classmethod
  def get_schema(cls) -> Dict[str, Any]:\nBody: return get_terminal_run_host_schema()\n\
  \n### execute() async method\nSignature: async def execute(self, **kwargs: Any)
  -> CommandResult:\nDocstring: (none required beyond class docstring)\nImplementation:\n\
  \  kwargs.pop(\"context\", None)\n  project_id = str(kwargs.get(\"project_id\",
  \"\")).strip()\n  session_id = str(kwargs.get(\"session_id\", \"\")).strip()\n \
  \ execution_kind = str(kwargs.get(\"execution_kind\", \"\")).strip()\n  command
  = kwargs.get(\"command\")\n  argv = kwargs.get(\"argv\")\n  cwd = kwargs.get(\"\
  cwd\")\n  timeout_seconds = int(kwargs.get(\"timeout_seconds\", _DEFAULT_TIMEOUT_S))\n\
  \  use_venv_arg: Optional[bool] = (\n      bool(kwargs[\"use_venv\"]) if \"use_venv\"\
  \ in kwargs else None\n  )\n\n  if execution_kind not in (\"shell\", \"argv\"):\n\
  \      return CommandResult(success=False, error=\"INVALID_COMMAND\")\n\n  cmd_str:
  Optional[str] = None\n  if command is not None:\n      cmd_str = str(command).strip()\n\
  \  argv_list: Optional[List[str]] = None\n  if argv is not None:\n      if not isinstance(argv,
  list):\n          return CommandResult(success=False, error=\"INVALID_COMMAND\"\
  )\n      argv_list = [str(x) for x in argv]\n\n  resolved = registry_resolve_project(project_id)\n\
  \  if not resolved.success or resolved.project_dir is None:\n      return CommandResult(\n\
  \          success=False,\n          error=resolved.error_code or \"PROJECT_NOT_FOUND\"\
  ,\n      )\n\n  srec, sess_err = resolve_session(project_id, session_id)\n  if sess_err
  is not None or srec is None:\n      return CommandResult(success=False, error=sess_err
  or \"INVALID_SESSION\")\n\n  effective_cwd, cwd_err = resolve_cwd(srec.session_dir,
  cwd)\n  if cwd_err is not None or effective_cwd is None:\n      return CommandResult(success=False,
  error=cwd_err or \"INVALID_CWD\")\n\n  use_venv = resolve_use_venv(srec.session_dir,
  use_venv_arg)\n  session_store = get_session_store()\n\n  return await enqueue_host_terminal_run(\n\
  \      project_id=project_id,\n      session_id=session_id,\n      srec=srec,\n\
  \      execution_kind=execution_kind,\n      cmd_str=cmd_str,\n      argv_list=argv_list,\n\
  \      effective_cwd=effective_cwd,\n      timeout_seconds=timeout_seconds,\n  \
  \    use_venv=use_venv,\n      project_dir=resolved.project_dir,\n      session_store=session_store,\n\
  \  )\n\n### metadata() classmethod\nSignature: @classmethod def metadata(cls) ->
  Dict[str, Any]:\nBody: return get_terminal_run_host_metadata(cls)\n\n## Constraints\n\
  - Create ONLY `mcp_terminal/commands/terminal_run_host_command.py`.\n- All type
  annotations must be present on every method signature.\n- File must not exceed 120
  lines.\n- Line length <= 99. Must pass flake8.\n- Author header in module docstring:
  Vasiliy Zdanovskiy / vasilyvz@gmail.com.\n"
