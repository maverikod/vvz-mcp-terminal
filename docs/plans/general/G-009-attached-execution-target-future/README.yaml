step_id: G-009
name: Attached Execution Target (Future)
status: draft
planning_only: true
description: "Reserves the attached execution target for future implementation. Not
  implemented in the current revision. Excluded from TASK_SYNC plan-to-code alignment
  (G-001..G-008 only). Included so the execution-target axis (C-017)
  is semantically complete and so tactical decomposition can begin from a defined
  surface once the implementation work is scheduled. The attached target will execute
  commands inside a long-running container that mcp_terminal did not create (typically
  an infrastructure container of the surrounding deployment such as the embedding
  service, the chunking service, or the proxy itself). The runtime mechanism will
  be docker exec against the target container, resolved server-side by allowlisted
  label or name; the model never supplies a container id directly. Configuration will
  live in terminal.attached_execution with enabled:false default and a list of allowlisted
  targets, each carrying attached_target_id, container_match, and a target-local allowed_commands.
  Authorization model parallels host: static, config-driven, allowlist-based.\n"
