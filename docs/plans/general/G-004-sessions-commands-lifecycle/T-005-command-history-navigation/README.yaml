step_id: T-005
parent_global_step: G-004
name: Command History Navigation Commands
status: frozen
description: 'Defines the history navigation subset of PublicCommandSet (C-014): terminal_list,
  terminal_get, terminal_search_commands, terminal_sessions, and terminal_get_status.
  terminal_list returns the most recent N commands for a given project_id + session_id
  from history.jsonl, ordered descending by timestamp; default limit is 25, maximum
  is max_history_limit from ConfigOverlay. terminal_get returns the full CommandRecord
  for one exact project_id + session_id + seq. terminal_search_commands searches command
  metadata fields (command display string, cwd, status, exit_code, timestamp range)
  by regex across history.jsonl; does not read output files. terminal_sessions returns
  all sessions for a project_id with per-session summary: session_id, created_at,
  last_command_at, commands_count, status, expires_at. terminal_get_status applies
  QueueResultSemantics (C-011): returns job_id, queue_status, terminal_status derived
  from exit_code and timed_out, exit_code, timed_out, output file names, output byte
  sizes, and execution_target read from the command meta file (sandbox|host; legacy
  meta value container is normalized to sandbox). All commands require project_id and
  session_id (except terminal_sessions which requires only project_id). All commands
  update last_activity_at.'
concepts:
- C-014
- C-011
inputs:
- name: history_navigation_request
  type: request object
  description: One of terminal_list, terminal_get, terminal_search_commands, terminal_sessions,
    or terminal_get_status request with required scope parameters.
- name: history_jsonl
  type: append-only JSONL file
  description: The session command history file containing all CommandRecord entries
    for the session.
outputs:
- name: navigation_response
  type: list, single record, search results, or status object
  description: 'For terminal_list: ordered list of command summaries. For terminal_get:
    full CommandRecord for one seq. For terminal_search_commands: matching command
    records with matched fields. For terminal_sessions: list of session summaries
    for the project. For terminal_get_status: queue status, terminal status, exit_code,
    timed_out, execution_target, file names, and byte sizes.'
