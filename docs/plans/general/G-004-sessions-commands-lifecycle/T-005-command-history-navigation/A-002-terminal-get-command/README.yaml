  \n## Class: TerminalGetCommand\nClass attributes:\n  name: str = \"terminal_get\"\
  \n  description: str = \"Return metadata for one command by exact seq.\"\n\n@classmethod\
  \ def get_schema(cls) -> Dict[str, Any]:\n  return {\n      \"type\": \"object\"\
  ,\n      \"properties\": {\n          \"project_id\": {\"type\": \"string\"},\n\
  \          \"session_id\": {\"type\": \"string\"},\n          \"seq\": {\"type\"\
  : \"integer\", \"description\": \"Session-local command sequence number.\"},\n \
  \     },\n      \"required\": [\"project_id\", \"session_id\", \"seq\"],\n  }\n\n\
