  \   main()\n```\n\n## What to change\n\nAdd terminal command registration using\
  \ the adapter hook mechanism (C-016/C-014).\n\n### 1. Add imports after existing\
  \ imports block\n\nAdd these lines after `from mcp_terminal.term_config import (...)`\
  \ block:\n\n```python\nfrom mcp_proxy_adapter.commands.hooks import register_custom_commands_hook\n\
  from mcp_terminal.commands.terminal_list_command import TerminalListCommand\nfrom\
