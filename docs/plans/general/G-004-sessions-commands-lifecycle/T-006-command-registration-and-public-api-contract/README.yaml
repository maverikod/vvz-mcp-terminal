step_id: T-006
parent_global_step: G-004
name: Command Registration and Public API Contract
status: draft
description: 'Defines the registration and public API contract of PublicCommandSet
  (C-014). All 12 terminal commands carry the terminal_ prefix and are registered
  via the adapter register_custom_commands_hook mechanism. No short aliases (list,
  delete, grep, tail, head, stat) are exposed in MCP help under any circumstances.
  Each command has a schema and a validate_params step following ADP-01 rules: get_schema()
  and metadata() stay separate, validate_params() enforces required fields before
  any domain logic runs. terminal_run returns job_id, seq, stdout_file, stderr_file,
  meta_file. terminal_delete requires session_id; project_id is optional — when provided,
  deletion is scoped to that project; when omitted, SessionStore (C-005) searches
  all known projects via ProjectRegistry (C-001). terminal_delete must report every
  deleted or skipped session using logical project/session identifiers, not raw host
  paths. The internal execution job is not registered as a public command.'
concepts:
- C-014
- C-005
inputs:
- name: adapter_hook_registry
  type: command registry object
  description: The adapter command registry provided via register_custom_commands_hook
    at server startup.
outputs:
- name: registered_public_commands
  type: set of registered command handlers
  description: All 12 terminal_* commands registered in the adapter registry with
    their schemas, validators, and handlers. Visible in MCP help after registration.
    No internal or short-alias commands included.
atomic_steps: []
