step_id: G-004
name: Sessions, Commands, and Execution Lifecycle
status: frozen
description: 'Covers the full domain of terminal sessions and command execution. A
  session is identified by (project_id, session_id) where session_id is UUID4. Each
  session owns a storage directory with an append-only command history and per-command
  output files named by a monotonic sequence number. Execution is queue-only: terminal_run
  allocates a seq, creates output files, appends a pending record, enqueues a job,
  and returns without waiting. The worker starts the container, redirects stdout and
  stderr to separate files, and updates record and queue state on completion. Covers
  all public API commands: terminal_session_create, terminal_run, terminal_list, terminal_get,
  terminal_read, terminal_search_commands, terminal_search_output, terminal_tail,
  terminal_stat, terminal_sessions, terminal_delete, terminal_get_status.'
