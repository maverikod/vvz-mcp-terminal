step_id: T-002
parent_global_step: G-006
name: Queue Result Semantics and MVP Acceptance Criteria
status: frozen
description: 'Defines QueueResultSemantics (C-011) as a binding invariant and codifies
  the MVP acceptance criteria. QueueResultSemantics invariant: queue job status=completed
  (progress=100) means the worker completed the full execution lifecycle and wrote
  metadata. It does not mean the terminal command succeeded. Terminal command success
  requires all three conditions: queue status is completed, exit_code equals 0, and
  timed_out is false. terminal_get_status must expose both states: the queue job status
  and the derived terminal_status (success, failure, timed_out), plus execution_target
  from meta. Callers must never treat queue completed as command success without inspecting
  exit_code and timed_out. Safety invariants that must be verifiable by tests: model
  cannot supply a host path as project_id, cannot select mount points, cannot escape
  /workspace via cwd or symlinks, cannot enable host networking, cannot add capabilities,
  cannot run privileged containers, cannot access Docker socket, cannot access unrelated
  projects, read-only mode prevents writes, timeout terminates and cleans up, output
  limits truncate safely, audit record is created for every run. MVP acceptance (tech_spec section 21) is fully automated: 195 pytest tests pass with zero skipped
  when Docker is available, covering sandbox safety invariants, queue semantics, unit-testable §21
  criteria, and live-Docker E2E in test_sandbox_mvp_acceptance.py and test_sandbox_docker_e2e.py.
  Verification mapping is in implementation_verification below.'
