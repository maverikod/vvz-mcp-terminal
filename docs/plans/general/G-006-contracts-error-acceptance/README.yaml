step_id: G-006
name: Contracts, Error Model, and Acceptance Criteria
status: frozen
description: 'Covers the observable contracts the system must honour: the stable error
  code set that callers use to handle rejections and failures programmatically, the
  queue result semantics invariant (queue completed does not imply terminal success;
  callers must inspect exit_code and timed_out), and the MVP acceptance criteria that
  define when the implementation is complete. Also covers the safety invariants that
  must be covered by tests, ensuring no escape path from the security boundary exists.'
