step_id: T-001
parent_global_step: G-006
name: Error Contract Definition
status: draft
description: 'Defines ErrorContract (C-015) as the complete, stable, closed set of
  error codes returned by the server. Each code maps to exactly one rejection condition
  and must not change meaning between versions. The defined codes and their conditions:
  PROJECT_NOT_FOUND (project_id not in registry), PROJECT_DELETED (project marked
  deleted), PROJECT_PAUSED (execution blocked by policy), PROJECT_PATH_OUT_OF_SCOPE
  (canonical path outside allowed root), INVALID_CWD (cwd escapes /workspace or is
  invalid), INVALID_COMMAND (empty command, missing execution_kind, or invalid shell/argv
  fields), INVALID_SESSION (missing session_id, non-UUID4 format, or unknown session),
  IMAGE_PROFILE_NOT_ALLOWED (image_profile not in server allowlist), MODE_NOT_ALLOWED
  (mount/write mode forbidden by policy), NETWORK_MODE_NOT_ALLOWED (network mode not
  in allowlist), TIMEOUT_EXCEEDED (command exceeded configured timeout), OUTPUT_LIMIT_EXCEEDED
  (output truncated at configured byte limit), CONTAINER_CREATE_FAILED (runtime failed
  to create container), CONTAINER_EXEC_FAILED (runtime failed to execute command),
  CONTAINER_CLEANUP_FAILED (container cleanup failed after execution). The code set
  is closed: no new code may be added without a version change. Callers handle rejections
  programmatically by code, not by parsing message text.'
concepts:
- C-015
inputs:
- name: rejection_event
  type: structured error context
  description: The specific validation failure or execution failure event generated
    by SandboxPolicy (C-003) or TerminalExecutionJob (C-009).
outputs:
- name: error_response
  type: structured error with stable code
  description: Error response containing the stable ErrorContract code, a human-readable
    message (not stable across versions), and the rejected field name where applicable.
    Returned to the caller without leaking host paths or internal state.
atomic_steps: []
