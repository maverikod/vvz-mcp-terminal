prompt: "Create the file `mcp_terminal/services/project_registry.py`.\n\nOperation:\
  \ create_file\n\n## Purpose\n\nThis module implements the project registry service\
  \ (C-001) and project marker\nvalidation (C-002). This first atomic step creates\
  \ the file with the\nProjectMarker dataclass and its validation logic only. Registry\
  \ build and\nruntime resolution are added in subsequent steps.\n\n## MRS concept\
  \ excerpt\n\nC-002 ProjectMarker:\n  definition: Fixed-format file named exactly\
  \ \"projectid\" at the root of a\n    project directory. Contains JSON with required\
  \ fields id (UUID4) and\n    description (string). mcp_terminal may only read this\
  \ file; it must not\n    rename, reconfigure, or rewrite it.\n  properties:\n  \
  \  - Filename is fixed to \"projectid\" and is not configurable\n    - Must be valid\
  \ JSON\n    - id field must be present; UUID4 format enforced when require_uuid4_id\
  \ is true\n    - description field is required\n    - Directory name is not the\
  \ project identity; the id field is\n\n## Required content (complete file)\n\n```python\n\
  \"\"\"\nProject registry and marker validation for mcp_terminal.\n\nProjectRegistry\
  \ (C-001) builds an in-memory index of valid projects from\nprojectid marker files\
  \ (C-002) found under the configured projects root.\nRuntime resolution enforces\
  \ canonical path containment before any mount.\n\nAuthor: Vasiliy Zdanovskiy\nEmail:\
  \ vasilyvz@gmail.com\n\"\"\"\n\nfrom __future__ import annotations\n\nimport json\n\
  import re\nfrom dataclasses import dataclass\nfrom pathlib import Path\nfrom typing\
  \ import Optional\n\n\n@dataclass(frozen=True)\nclass ProjectMarker:\n    \"\"\"\
  Validated content of a projectid marker file (C-002).\n\n    Constructed only by\
  \ validate_marker_file(); never directly by callers.\n    The directory that contains\
  \ this marker is not the project identity;\n    only the id field is.\n    \"\"\"\
  \n\n    project_id: str\n    \"\"\"UUID4 string from the id field of the marker\
  \ file.\"\"\"\n    description: str\n    \"\"\"Human-readable project description\
  \ from the description field.\"\"\"\n    marker_path: Path\n    \"\"\"Absolute path\
  \ to the projectid marker file (read-only reference).\"\"\"\n    project_dir: Path\n\
  \    \"\"\"Absolute path to the project root directory containing the marker.\"\"\
  \"\n\n\n@dataclass(frozen=True)\nclass MarkerValidationError:\n    \"\"\"Structured\
  \ rejection reason from validate_marker_file().\"\"\"\n\n    path: Path\n    \"\"\
  \"Path of the candidate file that failed validation.\"\"\"\n    reason: str\n  \
  \  \"\"\"Human-readable description of the validation failure.\"\"\"\n    code:\
  \ str\n    \"\"\"Short code: invalid_json, missing_id, missing_description, invalid_uuid4,\
  \ not_a_file.\"\"\"\n\n\n_UUID4_RE: re.Pattern[str] = re.compile(\n    r'^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$',\n\
  \    re.IGNORECASE,\n)\n\n\ndef _is_uuid4(value: str) -> bool:\n    \"\"\"Return\
  \ True if value matches the UUID4 format.\"\"\"\n    return bool(_UUID4_RE.match(value))\n\
  \n\ndef validate_marker_file(\n    candidate: Path,\n    *,\n    require_uuid4_id:\
  \ bool = True,\n) -> tuple[Optional[ProjectMarker], Optional[MarkerValidationError]]:\n\
  \    \"\"\"Validate a candidate projectid marker file.\n\n    Reads the file, parses\
  \ JSON, checks required fields, and optionally\n    validates UUID4 format on the\
  \ id field. The file must be named\n    \"projectid\"; callers are responsible for\
  \ providing only files with\n    that name.\n\n    mcp_terminal must never rename,\
  \ reconfigure, or rewrite the marker file.\n    This function is read-only.\n\n\
  \    Args:\n        candidate: Absolute path to a file named \"projectid\".\n  \
  \      require_uuid4_id: When True, reject id values that do not match\n       \
  \     UUID4 format.\n\n    Returns:\n        A tuple (ProjectMarker, None) on success,\
  \ or\n        (None, MarkerValidationError) on failure.\n    \"\"\"\n    if not\
  \ candidate.is_file():\n        return None, MarkerValidationError(\n          \
  \  path=candidate,\n            reason=\"not a regular file\",\n            code=\"\
  not_a_file\",\n        )\n    try:\n        data = json.loads(candidate.read_text(encoding=\"\
  utf-8\"))\n    except Exception:  # noqa: BLE001\n        return None, MarkerValidationError(\n\
  \            path=candidate,\n            reason=\"not valid JSON\",\n         \
  \   code=\"invalid_json\",\n        )\n    if not data.get(\"id\"):\n        return\
  \ None, MarkerValidationError(\n            path=candidate,\n            reason=\"\
  missing or empty id field\",\n            code=\"missing_id\",\n        )\n    if\
  \ not isinstance(data.get(\"description\"), str):\n        return None, MarkerValidationError(\n\
  \            path=candidate,\n            reason=\"missing or non-string description\
  \ field\",\n            code=\"missing_description\",\n        )\n    if require_uuid4_id\
  \ and not _is_uuid4(str(data[\"id\"])):\n        return None, MarkerValidationError(\n\
  \            path=candidate,\n            reason=f\"id {data['id']!r} is not a valid\
  \ UUID4\",\n            code=\"invalid_uuid4\",\n        )\n    return ProjectMarker(\n\
  \        project_id=str(data[\"id\"]).strip(),\n        description=str(data[\"\
  description\"]),\n        marker_path=candidate.resolve(),\n        project_dir=candidate.resolve().parent,\n\
  \    ), None\n```\n\n## Constraints\n- Write the file exactly as shown above.\n\
  - No ProjectRegistry class in this step.\n- All type annotations must be present.\n\
  - File must pass `flake8 mcp_terminal/services/project_registry.py`\n  with no errors\
  \ (line length limit 99).\n"
