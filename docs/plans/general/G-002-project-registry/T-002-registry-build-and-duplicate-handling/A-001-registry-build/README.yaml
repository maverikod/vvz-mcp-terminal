prompt: "Modify the file `mcp_terminal/services/project_registry.py`.\n\nOperation:\
  \ modify_file\n\n## Current file content (full, after G-002/T-001/A-001)\n\n```python\n\
  \"\"\"\nProject registry and marker validation for mcp_terminal.\n\nProjectRegistry\
  \ (C-001) builds an in-memory index of valid projects from\nprojectid marker files\
  \ (C-002) found under the configured projects root.\nRuntime resolution enforces\
  \ canonical path containment before any mount.\n\nAuthor: Vasiliy Zdanovskiy\nEmail:\
  \ vasilyvz@gmail.com\n\"\"\"\n\nfrom __future__ import annotations\n\nimport json\n\
  import re\nfrom dataclasses import dataclass\nfrom pathlib import Path\nfrom typing\
  \ import Optional\n\n\n@dataclass(frozen=True)\nclass ProjectMarker:\n    \"\"\"\
  Validated content of a projectid marker file (C-002).\n\n    Constructed only by\
  \ validate_marker_file(); never directly by callers.\n    The directory that contains\
  \ this marker is not the project identity;\n    only the id field is.\n    \"\"\"\
  \n\n    project_id: str\n    \"\"\"UUID4 string from the id field of the marker\
  \ file.\"\"\"\n    description: str\n    \"\"\"Human-readable project description\
  \ from the description field.\"\"\"\n    marker_path: Path\n    \"\"\"Absolute path\
  \ to the projectid marker file (read-only reference).\"\"\"\n    project_dir: Path\n\
  \    \"\"\"Absolute path to the project root directory containing the marker.\"\"\
  \"\n\n\n@dataclass(frozen=True)\nclass MarkerValidationError:\n    \"\"\"Structured\
  \ rejection reason from validate_marker_file().\"\"\"\n\n    path: Path\n    \"\"\
  \"Path of the candidate file that failed validation.\"\"\"\n    reason: str\n  \
  \  \"\"\"Human-readable description of the validation failure.\"\"\"\n    code:\
  \ str\n    \"\"\"Short code: invalid_json, missing_id, missing_description, invalid_uuid4,\
  \ not_a_file.\"\"\"\n\n\n_UUID4_RE: re.Pattern[str] = re.compile(\n    r'^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$',\n\
  \    re.IGNORECASE,\n)\n\n\ndef _is_uuid4(value: str) -> bool:\n    \"\"\"Return\
  \ True if value matches the UUID4 format.\"\"\"\n    return bool(_UUID4_RE.match(value))\n\
  \n\ndef validate_marker_file(\n    candidate: Path,\n    *,\n    require_uuid4_id:\
  \ bool = True,\n) -> tuple[Optional[ProjectMarker], Optional[MarkerValidationError]]:\n\
  \    \"\"\"Validate a candidate projectid marker file.\n\n    Reads the file, parses\
  \ JSON, checks required fields, and optionally\n    validates UUID4 format on the\
  \ id field. The file must be named\n    \"projectid\"; callers are responsible for\
  \ providing only files with\n    that name.\n\n    mcp_terminal must never rename,\
  \ reconfigure, or rewrite the marker file.\n    This function is read-only.\n\n\
  \    Args:\n        candidate: Absolute path to a file named \"projectid\".\n  \
  \      require_uuid4_id: When True, reject id values that do not match\n       \
  \     UUID4 format.\n\n    Returns:\n        A tuple (ProjectMarker, None) on success,\
  \ or\n        (None, MarkerValidationError) on failure.\n    \"\"\"\n    if not\
  \ candidate.is_file():\n        return None, MarkerValidationError(\n          \
  \  path=candidate,\n            reason=\"not a regular file\",\n            code=\"\
  not_a_file\",\n        )\n    try:\n        data = json.loads(candidate.read_text(encoding=\"\
  utf-8\"))\n    except Exception:  # noqa: BLE001\n        return None, MarkerValidationError(\n\
  \            path=candidate,\n            reason=\"not valid JSON\",\n         \
  \   code=\"invalid_json\",\n        )\n    if not data.get(\"id\"):\n        return\
  \ None, MarkerValidationError(\n            path=candidate,\n            reason=\"\
  missing or empty id field\",\n            code=\"missing_id\",\n        )\n    if\
  \ not isinstance(data.get(\"description\"), str):\n        return None, MarkerValidationError(\n\
  \            path=candidate,\n            reason=\"missing or non-string description\
  \ field\",\n            code=\"missing_description\",\n        )\n    if require_uuid4_id\
  \ and not _is_uuid4(str(data[\"id\"])):\n        return None, MarkerValidationError(\n\
  \            path=candidate,\n            reason=f\"id {data['id']!r} is not a valid\
  \ UUID4\",\n            code=\"invalid_uuid4\",\n        )\n    return ProjectMarker(\n\
  \        project_id=str(data[\"id\"]).strip(),\n        description=str(data[\"\
  description\"]),\n        marker_path=candidate.resolve(),\n        project_dir=candidate.resolve().parent,\n\
  \    ), None\n```\n\n## MRS concept excerpt\n\nC-001 ProjectRegistry:\n  definition:\
  \ Scans projects.root_dir on startup and explicit refresh.\n    Builds a registry\
  \ of valid projects from projectid marker files.\n    Resolves project_id to a canonical\
  \ project root path.\n  properties:\n    - Rejects duplicates; all conflicting projects\
  \ disabled until operator\n      fixes conflict\n    - Rejects symlink escapes,\
  \ relative traversal, and paths outside\n      projects.root_dir\n    - Resolution\
  \ is read-only; registry is built from marker files only\n    - require_uuid4_id\
  \ config flag enforces UUID4 format on marker id field\n    - allow_nested_projects=false\
  \ (default) rejects nested project markers\n\n## What to add\n\nAppend the following\
  \ imports and classes after the existing file content.\n\n### New imports (add to\
  \ top of file, merging with existing)\nAdd these lines to the imports section:\n\
  ```python\nimport logging\nfrom dataclasses import dataclass, field  # add field\
  \ to existing dataclass import\nfrom typing import Dict, FrozenSet, List, Optional\
  \  # extend existing Optional\n```\n\n### @dataclass class RegistryEntry  (NOT frozen)\n\
  ```python\n@dataclass\nclass RegistryEntry:\n    \"\"\"Single entry in the ProjectRegistry\
  \ index.\"\"\"\n\n    marker: ProjectMarker\n    \"\"\"Validated marker data for\
  \ this project.\"\"\"\n    disabled: bool = False\n    \"\"\"True when the entry\
  \ is disabled due to a duplicate id conflict.\"\"\"\n    conflict_reason: Optional[str]\
  \ = None\n    \"\"\"Human-readable reason for disabling, set when disabled=True.\"\
  \"\"\n```\n\n### class ProjectRegistry\n```python\nclass ProjectRegistry:\n    \"\
  \"\"In-memory registry of valid mcp_terminal projects (C-001).\n\n    Built from\
  \ projectid marker files found under projects.root_dir.\n    Provides project_id\
  \ -> canonical host path resolution with path\n    containment enforcement.\n  \
  \  \"\"\"\n\n    MARKER_FILENAME: str = \"projectid\"  # fixed; never configurable\n\
  \n    def __init__(\n        self,\n        root_dir: Path,\n        *,\n      \
  \  require_uuid4_id: bool = True,\n        allow_nested_projects: bool = False,\n\
  \    ) -> None:\n        \"\"\"Initialise registry without scanning.\n\n       \
  \ Args:\n            root_dir: Host directory containing candidate project subdirectories.\n\
  \            require_uuid4_id: Enforce UUID4 format on marker id field.\n      \
  \      allow_nested_projects: When False, reject markers inside\n              \
  \  subdirectories of other project directories.\n        \"\"\"\n        self._root_dir:\
  \ Path = root_dir.resolve()\n        self._require_uuid4_id: bool = require_uuid4_id\n\
  \        self._allow_nested_projects: bool = allow_nested_projects\n        self._entries:\
  \ Dict[str, RegistryEntry] = {}\n        self._logger: logging.Logger = logging.getLogger(__name__)\n\
  \n    def build(self) -> None:\n        \"\"\"Scan projects.root_dir and build the\
  \ in-memory project index.\n\n        Scans only direct subdirectories of root_dir.\
  \ For each candidate,\n        attempts to read and validate the projectid marker\
  \ file. Rejects:\n        - files directly inside root_dir (not subdirectories)\n\
  \        - directories without the marker file\n        - invalid markers (invalid\
  \ JSON, missing fields, UUID4 violations)\n        - directories that resolve outside\
  \ root_dir\n        - nested project markers when allow_nested_projects is False\n\
  \        On duplicate id detection, disables all conflicting entries.\n        \"\
  \"\"\n        self._entries.clear()\n        candidates: List[tuple[Path, ProjectMarker]]\
  \ = []\n        for subdir in self._root_dir.iterdir():\n            if not subdir.is_dir():\n\
  \                continue\n            marker_path = subdir / self.MARKER_FILENAME\n\
  \            marker, err = validate_marker_file(\n                marker_path, require_uuid4_id=self._require_uuid4_id\n\
  \            )\n            if err:\n                self._logger.debug(\"Skipping\
  \ %s: %s\", marker_path, err.reason)\n                continue\n            real_root\
  \ = self._root_dir\n            real_project = marker.project_dir.resolve()\n  \
  \          try:\n                real_project.relative_to(real_root)\n         \
  \   except ValueError:\n                self._logger.warning(\n                \
  \    \"Rejecting %s: project path outside root\", real_project\n               \
  \ )\n                continue\n            if not self._allow_nested_projects:\n\
  \                for existing_path, _ in candidates:\n                    try:\n\
  \                        real_project.relative_to(existing_path)\n             \
  \           self._logger.warning(\n                            \"Rejecting nested\
  \ project %s inside %s\",\n                            real_project, existing_path,\n\
  \                        )\n                        break\n                    except\
  \ ValueError:\n                        pass\n                else:\n           \
  \         candidates.append((real_project, marker))\n            else:\n       \
  \         candidates.append((real_project, marker))\n\n        seen: Dict[str, list]\
  \ = {}\n        for _, marker in candidates:\n            seen.setdefault(marker.project_id,\
  \ []).append(marker)\n        for project_id, markers in seen.items():\n       \
  \     if len(markers) == 1:\n                self._entries[project_id] = RegistryEntry(marker=markers[0])\n\
  \            else:\n                conflict_reason = (\n                    f\"\
  Duplicate project_id {project_id!r} found in \"\n                    f\"{[str(m.project_dir)\
  \ for m in markers]}\"\n                )\n                self._logger.error(conflict_reason)\n\
  \                for marker in markers:\n                    self._entries[project_id]\
  \ = RegistryEntry(\n                        marker=marker,\n                   \
  \     disabled=True,\n                        conflict_reason=conflict_reason,\n\
  \                    )\n\n    @property\n    def known_project_ids(self) -> FrozenSet[str]:\n\
  \        \"\"\"All project ids in the registry, including disabled entries.\"\"\"\
  \n        return frozenset(self._entries.keys())\n```\n\n## Constraints\n- Do not\
