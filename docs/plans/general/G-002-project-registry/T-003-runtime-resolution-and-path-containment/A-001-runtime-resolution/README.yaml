  \    \"\"\"Human-readable detail; not stable across versions.\"\"\"\n```\n\n###\
  \ 2. Add resolve() and refresh() methods to ProjectRegistry class\n\nAdd these methods\
  \ after the known_project_ids property:\n\n```python\n    def resolve(self, project_id:\
  \ str) -> ResolutionResult:\n        \"\"\"Resolve project_id to a verified canonical\
