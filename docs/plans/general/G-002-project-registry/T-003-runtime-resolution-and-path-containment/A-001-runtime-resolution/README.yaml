  \ entry = self._entries.get(project_id)\n        if entry is None:\n           \
  \ return ResolutionResult(\n                success=False,\n                error_code=\"\
  PROJECT_NOT_FOUND\",\n                detail=f\"project_id {project_id!r} not found\
  \ in registry\",\n            )\n        if entry.disabled:\n            return\
  \ ResolutionResult(\n                success=False,\n                error_code=\"\
  PROJECT_NOT_FOUND\",\n                detail=entry.conflict_reason or \"project\
  \ is disabled due to duplicate id\",\n            )\n        project_dir = entry.marker.project_dir\n\
  \        if not project_dir.is_dir():\n            return ResolutionResult(\n  \
  \              success=False,\n                error_code=\"PROJECT_NOT_FOUND\"\
  ,\n                detail=f\"project directory no longer exists: {project_dir}\"\
  ,\n            )\n        real_root = self._root_dir.resolve()\n        real_project\
  \ = project_dir.resolve()\n        try:\n            real_project.relative_to(real_root)\n\
