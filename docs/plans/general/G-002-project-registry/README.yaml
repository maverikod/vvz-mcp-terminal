step_id: G-002
name: Project Registry and Resolution
status: frozen
description: Covers the mechanism by which the server discovers projects and resolves
  a caller-supplied project_id into a verified host path. The registry is built from
  projectid marker files found under the configured projects root directory. Runtime
  resolution enforces canonical path containment before any mount operation, rejecting
  symlink escapes, missing projects, and paths outside the configured root.
