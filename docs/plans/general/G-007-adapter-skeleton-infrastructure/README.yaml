step_id: G-007
name: Adapter Skeleton and Implementation Infrastructure
status: frozen
description: Covers the existing codebase that must be preserved and the 
  incremental extension model. The server is built on top of the adapter 
  skeleton and must not be rewritten. Terminal domain modules are added by 
  registering commands through the adapter hook mechanism. Covers the required 
  module structure, the phased delivery order (config overlay, services, queue 
  job, readers, container isolation), the testing strategy including 
  hostile-input cases, operational defaults, final binding decisions, and the 
  implementation recommendation.

  §28.10 current code state: host modules (host_execution_config, host_shell_scanner,
  host_run_service, host_session_executor, terminal_host_execution_job, terminal_run_host
  command) and admin commands (terminal_kill, terminal_get_session_bootstrap, terminal_list_watch,
  terminal_purge_sessions) extend the adapter skeleton without rewrite.
