step_id: G-007
name: Adapter Skeleton and Implementation Infrastructure
status: frozen
description: Covers the existing codebase that must be preserved and the incremental
  extension model. The server is built on top of the adapter skeleton and must not
  be rewritten. Terminal domain modules are added by registering commands through
  the adapter hook mechanism. Covers the required module structure, the phased delivery
  order (config overlay, services, queue job, readers, container isolation), the testing
  strategy including hostile-input cases, operational defaults, final binding decisions,
  and the implementation recommendation.
