name: Testing Strategy and Operational Defaults
status: frozen
description: 'Defines the testing strategy required by AdapterSkeleton (C-016) and
  the operational defaults of ConfigOverlay (C-013). Testing must include both normal
  and hostile cases. Unit tests cover: config generator produces adapter-valid config
  with terminal sections; validator rejects missing or non-positive ttl_seconds; project
  discovery accepts only valid projectid markers; session_id allocation produces UUID4;
  seq allocation is monotonic; output reader rejects invalid stream names and path
  traversal; regex search enforces match limits; terminal_delete rejects running sessions
  without force. Integration tests cover: mcp-terminal visible in proxy server list;
  MCP help shows all 17 terminal_* commands and no short aliases; session create/run/read/delete
  lifecycle end-to-end; queue status does not mask nested command failure; stdout
  and stderr written to separate files only. Hostile-input integration tests cover
  all safety invariants: cwd escape, Docker socket access, symlink escape, forbidden
  network mode, arbitrary image, privileged options, path traversal via seq, session
  deletion outside .terminals. Host invariant matrix H-1..H-11 (tech_spec §28.7) is
  the verification target in tests/test_host_invariants.py. Operational defaults from
  source_spec section 25 are the starting values for the ConfigOverlay generator:
  ttl_seconds=86400, cleanup_interval=3600, max_sessions=50, timeout=60, memory=1g,
  max_concurrent_runs=4, cleanup_always=true.'
