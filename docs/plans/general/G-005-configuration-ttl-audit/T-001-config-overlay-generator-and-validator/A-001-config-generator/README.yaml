prompt: "Create the file `mcp_terminal/config/config_generator.py`.\n\nOperation:\
  \ create_file\n\nNote: `mcp_terminal/config/__init__.py` is created by a separate\
  \ atomic step.\nDo NOT create it here. Only create `config_generator.py`.\n\n##\
  \ Purpose\n\nImplements ConfigOverlay (C-013) generator: extends the adapter\nSimpleConfigGenerator\
  \ with terminal-specific config sections.\n\n## MRS concept excerpt\n\nC-013 ConfigOverlay:\n\
  \  - Must call adapter generator/validator first, then terminal-specific layer\n\
  \  - Required sections: terminal.sessions, terminal.output,\n    terminal.commands,\
  \ terminal.cleanup, runtime\n  - terminal.sessions.ttl_seconds is required; rejected\
  \ if missing or non-positive\n  - default_history_limit must not exceed max_history_limit\n\
  \  - max_sessions_per_project must be >= 1 and max_commands_per_session must be\
  \ >= 1\n\n## Module docstring\n\"\"\"\nConfig generator overlay for mcp_terminal\
  \ (C-013).\n\nExtends adapter SimpleConfigGenerator with terminal-specific sections.\n\
  Call the adapter generator first, then merge terminal defaults on top.\n\nAuthor:\
  \ Vasiliy Zdanovskiy\nEmail: vasilyvz@gmail.com\n\"\"\"\n\n## Imports (exact)\n\
  from __future__ import annotations\n\nimport copy\nfrom typing import Any, Dict,\
  \ Optional\n\n## Module-level constant: TERMINAL_CONFIG_DEFAULTS\n\n```python\n\
  TERMINAL_CONFIG_DEFAULTS: Dict[str, Any] = {\n    \"terminal\": {\n        \"sessions\"\
  : {\n            \"ttl_seconds\": 86400,\n            \"cleanup_interval_seconds\"\
  : 3600,\n            \"max_sessions_per_project\": 50,\n            \"max_commands_per_session\"\
  : 1000,\n        },\n        \"output\": {\n            \"max_stdout_file_bytes\"\
  : 100_000_000,\n            \"max_stderr_file_bytes\": 100_000_000,\n          \
  \  \"default_read_bytes\": 65536,\n            \"max_read_bytes\": 262144,\n   \
  \     },\n        \"commands\": {\n            \"default_history_limit\": 25,\n\
  \            \"max_history_limit\": 200,\n            \"default_tail_lines\": 100,\n\
  \            \"max_tail_lines\": 5000,\n        },\n        \"cleanup\": {\n   \
  \         \"delete_expired_sessions\": True,\n            \"delete_running_sessions\"\
  : False,\n        },\n    },\n    \"runtime\": {\n        \"default_image_profile\"\
  : \"python_dev_3_12\",\n        \"default_mode\": \"read_only\",\n        \"default_network\"\
  : \"none\",\n        \"timeout_seconds\": 60,\n        \"max_timeout_seconds\":\
  \ 300,\n        \"memory\": \"1g\",\n        \"cpus\": 1.0,\n        \"pids_limit\"\
  : 256,\n        \"max_concurrent_runs\": 4,\n        \"cleanup_always\": True,\n\
  \    },\n}\n```\n\n## Function: generate_terminal_config\n\nSignature:\n  def generate_terminal_config(\n\
  \      base_config: Dict[str, Any],\n      *,\n      overrides: Optional[Dict[str,\
  \ Any]] = None,\n  ) -> Dict[str, Any]:\n\nDocstring:\n  \"\"\"Merge terminal-specific\
  \ default sections into base_config.\n\n  The caller is responsible for invoking\
  \ the adapter SimpleConfigGenerator\n  first and passing the resulting dict as base_config.\
  \ This function then\n  deep-merges TERMINAL_CONFIG_DEFAULTS into it. Caller-supplied\
  \ overrides\n  are applied last.\n\n  This implements the C-013 overlay pattern:\
  \ adapter first, terminal layer\n  second, caller overrides third.\n\n  Args:\n\
  \      base_config: Adapter-valid config dict already produced by calling\n    \
  \      adapter SimpleConfigGenerator. May be empty dict for testing.\n      overrides:\
  \ Optional terminal-specific overrides to apply on top of\n          the merged\
  \ defaults. Values at top level fully replace defaults.\n\n  Returns:\n      New\
  \ dict containing both adapter sections and all terminal sections.\n  \"\"\"\n\n\
  Implementation:\n  result = copy.deepcopy(base_config)\n  for key, value in TERMINAL_CONFIG_DEFAULTS.items():\n\
  \      if key not in result:\n          result[key] = copy.deepcopy(value)\n   \
  \   elif isinstance(value, dict):\n          for subkey, subval in value.items():\n\
  \              result[key].setdefault(subkey, copy.deepcopy(subval))\n  if overrides:\n\
  \      for key, value in overrides.items():\n          result[key] = copy.deepcopy(value)\n\
  \  return result\n\n## Constraints\n- Create ONLY `mcp_terminal/config/config_generator.py`.\n\
  - Do NOT create mcp_terminal/config/__init__.py here.\n- All type annotations required.\n\
  - File must not exceed 100 lines.\n- Line length limit 99. Must pass flake8.\n"
