step_id: G-005
name: Configuration, TTL, and Audit
status: frozen
description: 'Covers the terminal-specific configuration layer and audit trail. Configuration
  is a structured overlay on top of the adapter SimpleConfig: a generator extends
  the adapter generator with terminal sections, a validator extends the adapter validator
  with terminal-specific checks, and a CLI exposes generate/validate/help subcommands.
  Key validated parameters include TTL, cleanup interval, output size limits, and
  history limits. The TTL cleanup service deletes expired sessions and protects running
  sessions. Every terminal_run invocation produces an immutable audit record regardless
  of outcome, containing full execution context without secret values.

  ConfigOverlay owns terminal.host_execution (gate and allowlist). terminal.attached_execution
  is a reserved stub until the G-009 gate is cleared.'
