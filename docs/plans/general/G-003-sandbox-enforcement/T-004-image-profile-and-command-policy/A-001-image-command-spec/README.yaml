prompt: "Modify the file `mcp_terminal/services/sandbox_policy.py`.\n\nOperation:\
  \ modify_file\n\n## Current state of the file (after all prior atomic steps)\n\n\
  The file contains: TrustCategory, TrustBoundary, TERMINAL_TRUST_BOUNDARY,\nPolicyConfig,\
  \ DEFAULT_POLICY_CONFIG, MountSpec, NetworkSpec,\nDEFAULT_NETWORK_SPEC, PACKAGE_REGISTRY_NETWORK_SPEC,\
  \ ValidationResult,\nand SandboxPolicy with validate(), build_mount_spec(), build_network_spec().\n\
  \n## MRS concept excerpt\n\nC-003 SandboxPolicy:\n  - Image profile must be from\
  \ server-side allowlist; caller cannot provide\n    image names\n  - Command policy\
  \ denies empty argv, NUL bytes, absolute executables outside\n    safe PATH\n\n\
  ## What to add\n\nAdd the following dataclass and method to the file. Do not modify\
  \ existing code.\n\n### @dataclass(frozen=True) ImageAndCommandSpec  (add after\
  \ PACKAGE_REGISTRY_NETWORK_SPEC)\n\n```python\n@dataclass(frozen=True)\nclass ImageAndCommandSpec:\n\
  \    \"\"\"Validated image reference and resolved command configuration (C-003/C-010).\n\
  \n    Produced by SandboxPolicy.build_image_and_command_spec().\n    Consumed by\
  \ ContainerRunner.build_cmd().\n    \"\"\"\n\n    image_reference: str\n    \"\"\
  \"Concrete server-side image reference resolved from image_profile.\"\"\"\n    execution_kind:\
  \ str\n    \"\"\"Validated execution kind: 'shell' or 'argv'.\"\"\"\n    resolved_argv:\
  \ list\n    \"\"\"Actual argv passed to container entrypoint.\"\"\"\n    environment:\
  \ dict\n    \"\"\"Safe minimal environment variables; no host secrets.\"\"\"\n \
  \   resolved_executable: Optional[str]\n    \"\"\"First element of resolved_argv\
  \ for audit logging; may be None for shell.\"\"\"\n```\n\n### IMAGE_PROFILE_MAP\
  \ constant (add after ImageAndCommandSpec)\n\n```python\nIMAGE_PROFILE_MAP: Dict[str,\
  \ str] = {\n    \"python_dev_3_12\": \"ghcr.io/mcp-terminal/python-dev:3.12\",\n\
  \    \"node_dev_20\": \"ghcr.io/mcp-terminal/node-dev:20\",\n    \"base_tools\"\
  : \"ghcr.io/mcp-terminal/base-tools:latest\",\n}\n```\nAdd `Dict` to the existing\
  \ `from typing import` line if not already present.\n\n### build_image_and_command_spec()\
  \ method on SandboxPolicy\n\nSignature:\n  def build_image_and_command_spec(\n \
  \     self,\n      *,\n      image_profile: str,\n      execution_kind: str,\n \
  \     command: Optional[str],\n      argv: Optional[list],\n  ) -> tuple[Optional[ImageAndCommandSpec],\
  \ Optional[ValidationResult]]:\n\nDocstring:\n  \"\"\"Validate image profile and\
  \ build resolved command specification.\n\n  Maps image_profile to a concrete server-side\
  \ image reference. Resolves\n  execution_kind and command/argv into the final resolved_argv\
  \ list.\n  Records the resolved executable for audit logging.\n\n  Args:\n     \
  \ image_profile: Caller-supplied profile name; must be in the server\n         \
  \ allowlist.\n      execution_kind: 'shell' or 'argv'.\n      command: Shell command\
  \ string; required for shell kind.\n      argv: Argv list; required for argv kind.\n\
  \n  Returns:\n      (ImageAndCommandSpec, None) on success, or (None, ValidationResult)\n\
  \      with error_code='IMAGE_PROFILE_NOT_ALLOWED' or 'INVALID_COMMAND'.\n  \"\"\
  \"\n\nImplementation:\n  image_ref = IMAGE_PROFILE_MAP.get(image_profile)\n  if\
  \ image_ref is None:\n      return None, ValidationResult(\n          permitted=False,\n\
  \          error_code=\"IMAGE_PROFILE_NOT_ALLOWED\",\n          rejected_field=\"\
  image_profile\",\n          detail=f\"image_profile {image_profile!r} is not in\
  \ the server allowlist\",\n      )\n  safe_env: dict = {\n      \"HOME\": \"/tmp/home\"\
  ,\n      \"TMPDIR\": \"/tmp\",\n      \"PATH\": \"/usr/local/bin:/usr/bin:/bin\"\
  ,\n  }\n  if execution_kind == \"shell\":\n      resolved = [\"bash\", \"-lc\",\
  \ command or \"\"]\n      resolved_exe: Optional[str] = None\n  else:\n      resolved\
  \ = list(argv or [])\n      resolved_exe = resolved[0] if resolved else None\n \
  \     if resolved_exe and resolved_exe.startswith(\"/\"):\n          safe = any(\n\
  \              resolved_exe.startswith(p)\n              for p in self._config.safe_path_prefixes\n\
  \          )\n          if not safe:\n              return None, ValidationResult(\n\
  \                  permitted=False,\n                  error_code=\"INVALID_COMMAND\"\
  ,\n                  rejected_field=\"argv\",\n                  detail=f\"absolute\
  \ executable {resolved_exe!r} outside safe PATH\",\n              )\n  return ImageAndCommandSpec(\n\
  \      image_reference=image_ref,\n      execution_kind=execution_kind,\n      resolved_argv=resolved,\n\
  \      environment=safe_env,\n      resolved_executable=resolved_exe,\n  ), None\n\
  \n## Constraints\n- Do not remove or alter any existing code.\n- Insert ImageAndCommandSpec\
  \ and IMAGE_PROFILE_MAP before SandboxPolicy class.\n- Add build_image_and_command_spec()\
  \ as last method of SandboxPolicy.\n- File must not exceed 400 lines total after\
  \ this step.\n- Line length limit 99. Must pass flake8.\n"
